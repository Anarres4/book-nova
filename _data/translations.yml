  faq:
    title: "Preguntas frecuentes"
    q1: "¿Book Nova es gratuita?"
    a1: |-
      Sí, Book Nova está disponible de forma gratuita con algunas limitaciones.

      📱 VERSIÓN GRATUITA:
      - Hasta 4 libros añadidos por día
      - Máximo 150 libros AÑADIDOS en total
      - Hasta 3 préstamos simultáneos
      - Calendario de lectura
      - Acceso a insignias básicas

      💎 VERSIÓN PREMIUM:
      - Añade libros sin límite cada día
      - Libros terminados ilimitados
      - Préstamos ilimitados (prestar y recibir)
      - Estadísticas básicas de lectura (por mes/año)
      - Estadísticas detalladas avanzadas
      - Acceso a todas las insignias y medallas premium

      ¡Todas las funciones principales siguen siendo gratuitas!
    q1_intro: "Sí, Book Nova está disponible de forma gratuita con algunas limitaciones."
    q1_free_title: "Versión gratuita"
    q1_free_limit1: "Hasta 4 libros añadidos por día"
    q1_free_limit2: "Máximo 150 libros AÑADIDOS en total"
    q1_free_limit3: "Hasta 3 préstamos simultáneos"
    q1_free_limit4: "Calendario de lectura"
