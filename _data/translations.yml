  faq:
    title: "Frequently Asked Questions"
    q1: "Is Book Nova free?"
    a1: |-
      Yes, Book Nova is available for free with a few limitations.

      📱 FREE VERSION:
      - Up to 4 books added per day
      - Maximum 150 books ADDED in total
      - Up to 3 simultaneous loans/borrows
      - Reading calendar
      - Access to core badges

      💎 PREMIUM VERSION:
      - Unlimited book additions per day
      - Unlimited finished books
      - Unlimited loans and borrows
      - Basic reading stats (monthly/yearly)
      - Advanced detailed statistics
      - Access to all premium badges and medals

      All core features remain free to use!
    q1_intro: "Yes, Book Nova is available for free with a few limitations."
