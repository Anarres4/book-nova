          - "Consulter des statistiques personnalisées et recevoir des recommandations anonymes mises à jour régulièrement"
        note: "L'Application fonctionne hors ligne pour la plupart des actions. Une synchronisation hebdomadaire via Firebase (Google Cloud) envoie une copie chiffrée de vos livres, catégories et notes afin de générer ces recommandations."
