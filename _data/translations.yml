  supportPage:
    title: "Besoin d'un coup de main ?"
    subtitle: "On a créé cette app pour des gens comme nous — des lecteurs, pas des experts en technologie. Si quelque chose ne marche pas comme prévu, on est là."
    contact:
      title: "Nous contacter"
      emailLabel: "Par email"
      inAppLabel: "Depuis l'application"
      inAppPath: "Paramètres → Support"
      responseTitle: "Délai de réponse"
      responseText: "1-2 jours ouvrés*. Pas de chatbot, pas de réponse automatique — juste nous."
      responseNote: "*Assurez-vous que votre boîte email n'est pas pleine, sinon nous ne pourrons pas vous répondre."
      deviceTitle: "Info utile"
      deviceText: "Pensez à nous indiquer votre type de téléphone et son modèle pour un diagnostic plus rapide."
      joke: "(Et si on met plus longtemps, c'est probablement qu'on est plongés dans un bon bouquin. Vous comprenez.)"
    faq:
      title: "Questions fréquentes"
      q1: "L'app fonctionne-t-elle hors connexion ?"
      a1: "Oui ! Vos livres sont stockés sur votre téléphone. Vous pouvez les consulter et en ajouter même sans internet. La synchronisation se fait automatiquement quand vous retrouvez une connexion."
      q2: "Mes données sont-elles en sécurité ?"
      a2: "Absolument. Vos livres sont synchronisés de façon chiffrée via Firebase. On ne vend rien, on ne partage rien avec des annonceurs. Votre bibliothèque reste la vôtre."
      q3: "Comment annuler mon abonnement Premium ?"
      a3: "Depuis les paramètres de votre App Store (iOS) ou Google Play Store (Android). On ne rend pas ça compliqué volontairement — c'est juste comme ça que fonctionnent les abonnements in-app."
      q4: "J'ai une idée pour améliorer l'app !"
      a4: "On adore ça. Envoyez-nous un email — les meilleures fonctionnalités de Book Nova sont venues de suggestions d'utilisateurs comme vous."
      q5: "J'ai trouvé un bug."
      a5: "Merci de nous le signaler ! Décrivez ce qui s'est passé (et sur quel téléphone vous êtes) et on s'en occupe rapidement."
      seeDetailedFaq: "voir la FAQ détaillée"
    finalWord:
      title: "Un dernier mot"
      p1: "Créer cette app, c'est un plaisir. Mais le vrai plaisir, c'est de savoir qu'elle aide des gens à lire plus, à découvrir des livres, à célébrer leur progression."
      p2: "Si vous avez 30 secondes, laissez-nous un avis sur l'App Store ou le Play Store. Ça nous aide énormément à faire connaître l'app — et ça nous fait chaud au cœur de lire vos retours."
      thanks: "Merci d'être là 📚"
      team: "— Ana + Florent = l'équipe Book Nova"
    backToHome: "← Retour à l'accueil"
  aboutPage:
    title: "Un couple, une passion, une app"
    subtitle: "L'histoire derrière Book Nova"
    story:
      title: "L'histoire"
      p1: "Book Nova est né d'une conversation simple entre deux amoureux passionnés de lecture."
      p2: "On cherchait une app pour suivre nos livres. Les options existantes étaient soit trop complexes (on ne veut pas un tableur Excel), soit trop sociales (on ne veut pas de likes et de followers), soit trop chronométrées, soit bourrées de pubs."
      p3: "On voulait juste quelque chose de simple et satisfaisant. Un endroit pour voir ce qu'on a lu, ce qu'on lit, et cette petite fierté de regarder sa bibliothèque grandir."
      idea: "\"Et si on mesurait nos lectures en hauteur ? Genre, atteindre notre propre taille en livres ?\""
      p4: "C'était une idée un peu bête. Mais plus on y réfléchissait, plus elle nous motivait. Il y avait quelque chose de profondément satisfaisant à imaginer une pile de livres qui grandit jusqu'à nos yeux, puis au-dessus de notre tête."
      p5: "Alors on l'a construite. Pas avec une équipe de 50 développeurs. Juste nous deux, le soir et le week-end, pendant des mois."
    whyHeight:
      title: "Pourquoi \"atteindre sa taille\" ?"
      p1: "Parce que lire peut être intimidant."
      thought1: "\"Je n'ai pas le temps.\""
      thought2: "\"Je ne sais pas quoi lire.\""
      thought3: "\"Je lis trop lentement.\""
      p2: "On connaît ces pensées — on se les est dites aussi."
      p3: "L'idée de la taille, c'est un objectif concret et personnel. Pas 52 livres par an comme les challenges internet. Pas de comparaison avec les autres."
      highlight: "Votre taille, votre défi."
      p4: "Que vous fassiez 1m55 ou 1m95, l'objectif est le vôtre. Et franchement ? C'est juste fun de se dire \"J'ai lu 63 cm cette année\"."
    beliefs:
      title: "Ce qu'on croit"
      b1_title: "Lire, c'est voyager."
      b1_desc: "Chaque livre est une porte vers un autre monde. C'est pour ça que nos badges racontent une odyssée spatiale — de la Terre jusqu'aux confins de l'univers."
      b2_title: "Tout le monde est un lecteur."
      b2_desc: "Un livre par an ou cent, peu importe. Si vous aimez lire, cette app est pour vous."
      b3_title: "La simplicité, c'est précieux."
      b3_desc: "On refuse d'ajouter des fonctionnalités juste pour en avoir plus. Chaque bouton, chaque écran a une raison d'être."
      b4_title: "Lecture sans pression."
      b4_desc: "Zéro culpabilité. Votre pile à lire grandit ? Aucun problème. Vous lisez lentement ? Parfait. Book Nova ne vous envoie ni notifications stressantes, ni emails moralisateurs."
    team:
      title: "L'équipe"
      p1: "Nous sommes un couple. Pas une startup. Pas une entreprise avec des investisseurs à satisfaire."
      p2: "On venait tous les deux de perdre notre travail. Au lieu de se laisser abattre, on s'est retrouvés autour d'un projet commun : créer l'app de lecture qu'on aurait voulu avoir."
      p3: "Juste deux amoureux qui aiment lire et qui ont transformé un moment difficile en aventure."
      fact1: "On répond nous-mêmes aux emails."
      fact2: "On lit chaque suggestion."
      fact3: "Et quand vous signalez un bug, c'est nous qui le corrigeons (souvent le soir même)."
      conclusion: "C'est peut-être petit. Mais c'est sincère."
    thanks:
      title: "Merci"
      p1: "À tous ceux qui utilisent Book Nova, qui nous envoient des messages, qui partagent leurs badges sur les réseaux, qui suggèrent des améliorations : merci."
      p2: "Vous faites partie de cette aventure."
      p3: "Chaque livre que vous ajoutez, chaque badge que vous débloquez, c'est un peu de votre voyage qui rejoint le nôtre."
      signature: "Bonne lecture 📚"
      team: "— Ana + Florent = l'équipe Book Nova"
    backToHome: "← Retour à l'accueil"
  medalEgg:
    title: "35 médailles collectées !"
    text: "Et toi, tes lectures font quelle taille ? Dépasse un chihuahua, un flamant rose, puis… une girafe !"
