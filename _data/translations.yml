    q2: "Puis-je suivre mes prêts de livres ?"
    a2: |-
      Oui ! Book Nova inclut un système complet de gestion de prêts :
      - Enregistrez à qui vous prêtez vos livres
      - Ajoutez les livres que vous empruntez
      - Recevez des notifications de rappel
      - Suivez les dates de retour prévues

      Version gratuite : jusqu'à 3 prêts/emprunts simultanés.
      Version Premium : prêts/emprunts illimités.
    q3: "Quels sont les badges disponibles ?"
    a3: |-
      Débloquez plus de 100 badges différents :
      - Badges de lecture (1, 5, 10... jusqu'à 1000 livres !)
      - Badges d'objectifs (hauteur de pile : fourmi, chat, girafe...)
      - Badges de genres littéraires (fiction, biographie, science-fiction...)
      - Badges spéciaux (lecteur nocturne, lecteur matinal, marathonien...)
      - Défis légendaires (Solar, Galaxy, Universe)

      Partagez vos badges sur les réseaux sociaux !
    q4: "L'application est-elle disponible en plusieurs langues ?"
    a4: |-
      Oui, Book Nova est proposée en 3 langues :
      - Français 🇫🇷
      - Anglais 🇬🇧
      - Espagnol 🇪🇸

      Vous pouvez aussi définir la langue de chaque livre pour un meilleur suivi.
    q5: "Comment fonctionne la visualisation de la pile de livres ?"
    a5: |-
      Book Nova calcule la hauteur cumulée de vos livres lus et la compare à des repères visuels :

      📏 Exemples :
      - 0,5 cm → hauteur d'une fourmi 🐜
      - 20 cm → un chat assis 🐈
      - Votre taille → aussi grand que vous ! 👤
      - 3 m → une girafe 🦒

      Chaque palier débloque un badge unique : plus vous lisez, plus votre pile grandit !
    q6: "Puis-je exporter ma bibliothèque ?"
    a6: |-
      Oui, depuis la version 1.11.4 !
      Vous pouvez exporter et importer toutes vos données.
