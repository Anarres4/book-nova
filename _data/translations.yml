    q9: "Comment me désabonner de la version Premium ?"
    a9: |-
      Pour annuler votre abonnement Premium actif, suivez les mêmes étapes que pour annuler la période d'essai :

      📱 Sur Android :
      1. Ouvrez l'application Google Play Store
      2. Appuyez sur votre photo de profil en haut à droite
      3. Sélectionnez Paiements et abonnements > Abonnements
      4. Trouvez BookNova dans la liste
      5. Appuyez sur Annuler l'abonnement
      6. Confirmez l'annulation

      🍎 Sur iOS (iPhone/iPad) :
      1. Ouvrez l'application Réglages de votre appareil
      2. Appuyez sur votre nom en haut de l'écran
      3. Sélectionnez Abonnements
      4. Trouvez BookNova dans la liste
      5. Appuyez sur Annuler l'abonnement
      6. Confirmez l'annulation

      💡 Bon à savoir : Vous conserverez l'accès aux fonctionnalités premium jusqu'à la fin de la période de facturation en cours. Aucun remboursement ne sera effectué pour la période déjà payée.
