  supportPage:
    title: "¿Necesitas ayuda?"
    subtitle: "Creamos esta app para gente como nosotros: lectores, no expertos en tecnología. Si algo no funciona como esperabas, estamos aquí."
    contact:
      title: "Contáctanos"
      emailLabel: "Por email"
      inAppLabel: "Desde la aplicación"
      inAppPath: "Ajustes → Soporte"
      responseTitle: "Tiempo de respuesta"
      responseText: "1-2 días laborables*. Sin chatbot, sin respuestas automáticas: solo nosotros."
      responseNote: "*Asegúrate de que tu bandeja de entrada no esté llena, de lo contrario no podremos responder."
      deviceTitle: "Consejo útil"
      deviceText: "Indícanos el tipo y modelo de tu teléfono para un diagnóstico más rápido."
      joke: "(Y si tardamos más, probablemente estemos inmersos en un buen libro. Lo entiendes.)"
    faq:
      title: "Preguntas frecuentes"
      q1: "¿La app funciona sin conexión?"
      a1: "¡Sí! Tus libros se guardan en tu teléfono. Puedes consultarlos y añadirlos incluso sin internet. La sincronización se hace automáticamente cuando recuperas la conexión."
      q2: "¿Están seguros mis datos?"
      a2: "Por supuesto. Tus libros se sincronizan de forma cifrada a través de Firebase. No vendemos nada, no compartimos nada con anunciantes. Tu biblioteca sigue siendo tuya."
      q3: "¿Cómo cancelo mi suscripción Premium?"
      a3: "Desde los ajustes de tu App Store (iOS) o Google Play Store (Android). No lo complicamos a propósito: así es como funcionan las suscripciones in-app."
      q4: "¡Tengo una idea para mejorar la app!"
      a4: "Nos encanta eso. Envíanos un correo: las mejores funciones de Book Nova han venido de sugerencias de usuarios como tú."
      q5: "Encontré un bug."
      a5: "¡Gracias por avisarnos! Describe qué pasó (y qué teléfono usas) y lo resolveremos rápidamente."
      seeDetailedFaq: "ver FAQ detallada"
    finalWord:
      title: "Una última cosa"
      p1: "Crear esta app es un placer. Pero la verdadera alegría es saber que ayuda a la gente a leer más, descubrir libros y celebrar su progreso."
      p2: "Si tienes 30 segundos, déjanos una reseña en la App Store o Play Store. Nos ayuda mucho a dar a conocer la app, y nos alegra el corazón leer vuestros comentarios."
      thanks: "Gracias por estar aquí 📚"
      team: "— Ana + Florent = el equipo Book Nova"
    backToHome: "← Volver al inicio"
  aboutPage:
    title: "Una pareja, una pasión, una app"
    subtitle: "La historia detrás de Book Nova"
    story:
      title: "La historia"
      p1: "Book Nova nació de una conversación simple entre dos enamorados apasionados por la lectura."
      p2: "Buscábamos una app para seguir nuestros libros. Las opciones existentes eran o demasiado complejas (no queremos una hoja de cálculo), o demasiado sociales (no queremos likes ni seguidores), o demasiado cronometradas, o llenas de anuncios."
      p3: "Solo queríamos algo simple y satisfactorio. Un lugar para ver lo que hemos leído, lo que estamos leyendo, y ese pequeño orgullo de ver crecer nuestra biblioteca."
      idea: "\"¿Y si midiéramos nuestras lecturas en altura? Como alcanzar nuestra propia estatura en libros.\""
      p4: "Era una idea algo tonta. Pero cuanto más lo pensábamos, más nos motivaba. Había algo profundamente satisfactorio en imaginar una pila de libros creciendo hasta nuestros ojos, y luego por encima de nuestra cabeza."
      p5: "Así que la construimos. No con un equipo de 50 desarrolladores. Solo nosotros dos, por las noches y los fines de semana, durante meses."
    whyHeight:
      title: "¿Por qué \"alcanzar tu altura\"?"
      p1: "Porque leer puede ser intimidante."
      thought1: "\"No tengo tiempo.\""
      thought2: "\"No sé qué leer.\""
      thought3: "\"Leo demasiado lento.\""
      p2: "Conocemos esos pensamientos: también los hemos tenido."
      p3: "La idea de la altura es un objetivo concreto y personal. No 52 libros al año como los retos de internet. Sin comparaciones con los demás."
      highlight: "Tu altura, tu reto."
      p4: "Ya midas 1,55 m o 1,95 m, el objetivo es tuyo. Y sinceramente, es divertido decir \"He leído 63 cm este año\"."
    beliefs:
      title: "Lo que creemos"
      b1_title: "Leer es viajar."
      b1_desc: "Cada libro es una puerta a otro mundo. Por eso nuestras insignias cuentan una odisea espacial, desde la Tierra hasta los confines del universo."
      b2_title: "Todo el mundo es lector."
      b2_desc: "Un libro al año o cien, da igual. Si te gusta leer, esta app es para ti."
      b3_title: "La simplicidad es valiosa."
      b3_desc: "Nos negamos a añadir funciones solo por tener más. Cada botón, cada pantalla tiene una razón de ser."
      b4_title: "Lectura sin presión."
      b4_desc: "Cero culpabilidad. ¿Tu pila de lectura crece? No hay problema. ¿Lees despacio? Perfecto. Book Nova no te envía ni notificaciones estresantes, ni correos moralizadores."
    team:
      title: "El equipo"
      p1: "Somos una pareja. No una startup. No una empresa con inversores que satisfacer."
      p2: "Ambos acabábamos de perder nuestro trabajo. En lugar de dejarnos abatir, nos unimos en torno a un proyecto común: crear la app de lectura que siempre quisimos tener."
      p3: "Solo dos enamorados que aman leer y que convirtieron un momento difícil en una aventura."
      fact1: "Respondemos nosotros mismos los correos."
      fact2: "Leemos cada sugerencia."
      fact3: "Y cuando reportas un bug, somos nosotros quienes lo arreglamos (a menudo la misma noche)."
      conclusion: "Quizás sea pequeño. Pero es sincero."
    thanks:
      title: "Gracias"
      p1: "A todos los que usan Book Nova, nos envían mensajes, comparten sus insignias en redes, sugieren mejoras: gracias."
      p2: "Sois parte de esta aventura."
      p3: "Cada libro que añades, cada insignia que desbloqueas, es un poco de tu viaje uniéndose al nuestro."
      signature: "Feliz lectura 📚"
      team: "— Ana + Florent = el equipo Book Nova"
    backToHome: "← Volver al inicio"
  termsPage:
    title: "Términos de Uso"
    sections:
      acceptance:
        title: "1. Aceptación de las Condiciones"
        body: "Al descargar, instalar o usar la aplicación Book Nova (la 'Aplicación'), aceptas quedar vinculado por estas Condiciones de Uso. Si no estás de acuerdo, no utilices la Aplicación. Estas condiciones se aplican a todos los usuarios, tanto de la versión gratuita como de la premium."
      service:
        title: "2. Descripción del Servicio"
        body: "Book Nova es una aplicación móvil para gestionar tu biblioteca personal que te permite:"
        items:
          - "Gestionar tu colección de libros con seguimiento del progreso de lectura"
          - "Visualizar la altura de tu pila de libros en función de tu estatura"
          - "Escanear códigos de barras ISBN para recuperar automáticamente la información de los libros"
          - "Gestionar tus préstamos y devoluciones de libros"
          - "Desbloquear insignias y completar desafíos de lectura"
          - "Consultar estadísticas personalizadas y recibir recomendaciones anónimas actualizadas regularmente"
        note: "La Aplicación funciona sin conexión para la mayoría de acciones. Una sincronización semanal con Firebase (Google Cloud) envía una copia cifrada de tus libros, categorías y valoraciones para generar estas recomendaciones."
      usage:
        title: "3. Uso de la Aplicación"
        allowed:
          title: "3.1 Uso Permitido"
          body: "Te comprometes a usar Book Nova únicamente con fines personales y legales, entre ellos:"
          items:
            - "Gestionar tu biblioteca personal"
            - "Seguir tus lecturas y avances"
            - "Gestionar tus préstamos de libros con amigos y familiares"
            - "Consultar tus estadísticas y desbloquear insignias"
        prohibited:
          title: "3.2 Usos Prohibidos"
          body: "Está estrictamente prohibido usar la Aplicación para:"
          items:
            - "Infringir derechos de propiedad intelectual (piratería o intercambio ilegal de contenido protegido)"
            - "Automatizar solicitudes masivas a la API de ISBNdb (scraping o abuso de la API)"
            - "Modificar, descompilar, desensamblar o crear obras derivadas de la Aplicación"
            - "Eludir las limitaciones de la versión gratuita (4 libros por día y 150 libros añadidos en total)"
            - "Usar herramientas de terceros para desbloquear funciones premium de forma artificial"
            - "Dañar, deshabilitar o sobrecargar la Aplicación o la API de ISBNdb"
      userData:
        title: "4. Datos y Contenido del Usuario"
        ownership:
          title: "4.1 Propiedad de tus Datos"
          body: "Conservas todos los derechos sobre los datos que introduces en la Aplicación, incluidos:"
          items:
            - "Títulos de libros, autores y notas personales"
            - "Información sobre tus préstamos y préstamos recibidos"
            - "Progreso de lectura y estadísticas personalizadas"
            - "Avatar y ajustes personalizados"
          note: "Tus datos permanecen accesibles en tu dispositivo. Se sincroniza una copia mínima (libros, categorías, valoraciones y UUID anónimo) en Firebase para producir recomendaciones anónimas."
        responsibility:
          title: "4.2 Responsabilidad sobre el Contenido"
          body: "Eres el único responsable de la exactitud y legalidad de la información que introduces. No nos hacemos responsables de errores de registro ni de conflictos entre usuarios por préstamos de libros."
        backup:
          title: "4.3 Copias de Seguridad"
          body: "La Aplicación guarda tu información localmente y sincroniza una copia en Firebase. Te recomendamos mantener copias propias en iCloud/Google Drive y escribirnos si deseas eliminar la copia remota."
      isbndb:
        title: "5. API de ISBNdb y Metadatos"
        thirdParty:
          title: "5.1 Servicio de Terceros"
          body: "Book Nova utiliza la API de ISBNdb para obtener metadatos públicos de libros. No somos responsables de:"
          items:
            - "La disponibilidad o interrupciones de la API de ISBNdb"
            - "La exactitud de los datos proporcionados por ISBNdb"
        limits:
          title: "5.2 Límites de la Versión Gratuita"
          body: "Los usuarios de la versión gratuita están limitados a 4 libros añadidos por día, un máximo de 150 libros añadidos en total, y hasta 3 préstamos simultáneos. Los usuarios premium no tienen estas limitaciones."
      accounts:
        title: "6. Cuentas y Autenticación"
        noAccount:
          title: "6.1 Sin Cuenta Obligatoria"
          body: "La Aplicación no requiere crear una cuenta. La sincronización se basa en un identificador anónimo generado en tu dispositivo."
        uuid:
          title: "6.2 Identificador Anónimo (UUID)"
          body: "Se genera localmente un identificador anónimo (UUID) que solo se utiliza para:"
          items:
            - "Gestionar tu estado de suscripción premium mediante RevenueCat"
            - "Vincular tu sincronización con Firebase y generar recomendaciones anónimas"
            - "Preparar futuras funciones de recomendaciones locales"
          note: "Este UUID no contiene datos personales y nunca se comparte con fines publicitarios. También te permite solicitar la eliminación de tu copia sincronizada."
      premium:
        title: "7. Suscripción Premium y Compras In-App"
        features:
          title: "7.1 Funciones Premium"
          body: "La versión premium desbloquea:"
          items:
            - "Validaciones ilimitadas con metadatos a través de ISBNdb"
            - "Añadir libros sin límite diario"
            - "Estadísticas básicas de lectura (por mes/año)"
            - "Estadísticas detalladas avanzadas"
            - "Acceso a desafíos e insignias exclusivos."
            - "Acceso ilimitado a las recomendaciones de la página Descubrir."
        trial:
          title: "7.2 Período de prueba"
          body: "El período de prueba gratuito de 14 días solo está disponible una vez por cuenta. Una vez utilizado, no se puede reactivar."
        processing:
          title: "7.3 Procesamiento de Compras"
          body: "Las compras in-app se procesan por:"
          items:
            - "Apple App Store (iOS)"
            - "Google Play Store (Android)"
          note: "Estas compras están sujetas a las condiciones de cada plataforma. RevenueCat gestiona tus suscripciones de forma segura."
        refunds:
          title: "7.4 Política de Reembolsos"
          body: "Las solicitudes de reembolso deben dirigirse directamente a Apple o Google. Book Nova no puede gestionarlas."
        cancellation:
          title: "7.5 Cancelación de la Suscripción"
          body: "Puedes cancelar tu suscripción premium en cualquier momento desde tus ajustes de Apple o Google. La cancelación entra en vigor al final del período en curso."
      notifications:
        title: "8. Notificaciones"
        body: "La Aplicación puede enviar notificaciones locales para:"
        items:
          - "Recordarte los libros prestados (30 días después del préstamo)"
          - "Animarte a usar la Aplicación (recordatorio mensual opcional)"
        note: "Puedes desactivar estas notificaciones en los ajustes de tu dispositivo o de la Aplicación."
      intellectualProperty:
        title: "9. Propiedad Intelectual"
        rights:
          title: "9.1 Derechos sobre la Aplicación"
          body: "La Aplicación, su código, diseño, gráficos y contenido son propiedad exclusiva de Book Nova y están protegidos por las leyes de propiedad intelectual."
        license:
          title: "9.2 Licencia de Uso"
          body: "Te otorgamos una licencia no exclusiva, no transferible y revocable para utilizar la Aplicación con fines personales. Esta licencia no te permite:"
          items:
            - "Copiar, modificar o distribuir la Aplicación"
            - "Usar la Aplicación con fines comerciales sin autorización"
            - "Extraer o reutilizar elementos de la Aplicación (código, diseño, insignias)"
        metadata:
          title: "9.3 Metadatos de Libros"
          body: "Los metadatos de los libros provienen de bases públicas como ISBNdb y permanecen sujetos a los derechos de sus propietarios (editoriales y autores)."
      liability:
        title: "10. Limitación de Responsabilidad"
        asIs:
          title: "10.1 Provisión 'tal cual'"
          body: "La Aplicación se proporciona 'tal cual', sin garantías expresas ni implícitas. No garantizamos que:"
          items:
            - "La Aplicación esté libre de errores o fallos"
            - "El servicio esté disponible de forma permanente"
            - "Los datos de ISBNdb sean siempre exactos o estén actualizados"
        limit:
          title: "10.2 Límites de Responsabilidad"
          body: "En la medida permitida por la ley, Book Nova no será responsable de:"
          items:
            - "La pérdida de datos causada por eliminar la Aplicación o por fallos del dispositivo"
            - "Disputas entre usuarios relacionadas con libros no devueltos"
            - "Inexactitudes en los metadatos proporcionados por ISBNdb"
            - "Interrupciones o fallos de la API de ISBNdb"
            - "Cualquier daño indirecto, consecuente o punitivo"
      modifications:
        title: "11. Cambios en la Aplicación y en las Condiciones"
        app:
          title: "11.1 Actualizaciones de la Aplicación"
          body: "Nos reservamos el derecho de:"
          items:
            - "Modificar, mejorar o eliminar funciones"
            - "Ajustar los límites de la versión gratuita con un preaviso de 30 días"
        terms:
          title: "11.2 Cambios en las Condiciones"
          body: "Podemos actualizar estas Condiciones en cualquier momento. Los cambios entrarán en vigor cuando se publiquen en la Aplicación o en nuestro sitio web."
          note: "El uso continuado de la Aplicación tras los cambios implica la aceptación de las nuevas condiciones."
      termination:
        title: "12. Rescisión"
        user:
          title: "12.1 Rescisión por parte del Usuario"
          body: "Puedes dejar de usar la Aplicación en cualquier momento eliminándola. Si tienes una suscripción premium, cancélala en Apple o Google para evitar renovaciones."
      contact:
        title: "13. Contacto"
        body: "Si tienes preguntas sobre estas Condiciones de Uso, contáctanos en:"
        email: "book-nova@outlook.fr"
      jurisdiction:
        title: "14. Ley Aplicable y Jurisdicción"
        body: "Estas Condiciones de Uso se rigen por el derecho francés. Cualquier controversia relacionada con su interpretación o ejecución será competencia exclusiva de los tribunales franceses."
      generalProvisions:
        title: "15. Disposiciones Generales"
        body: "Si alguna disposición de estas Condiciones se considera inválida o inaplicable, las demás disposiciones seguirán en pleno vigor y efecto."
    summary:
      title: "Resumen rápido"
      items:
        - "Uso personal y legal únicamente"
        - "Tus datos siguen accesibles en tu dispositivo y se sincroniza una copia mínima mediante Firebase solo para recomendaciones"
        - "Versión gratuita: 4 libros añadidos por día y 150 libros añadidos en total"
        - "Versión premium: añadidos y libros terminados ilimitados"
        - "Compras gestionadas por Apple/Google; reembolsos a través de ellos"
        - "Aplicación proporcionada 'tal cual', responsabilidad limitada"
        - "Sin cuenta obligatoria; un UUID anónimo gestiona el premium y la sincronización con Firebase dedicada a recomendaciones"
    lastUpdated: "Última actualización: 19/03/2026"
    backToHome: "Volver al inicio"
