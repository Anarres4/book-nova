    q10: "Qu'est-ce que la page Découvrir ?"
    a10: |-
      La page Découvrir vous propose des recommandations de livres personnalisées basées sur vos lectures et préférences.

      📱 VERSION GRATUITE :
      - 20 recommandations par genre
      - Suggestions basées sur vos genres favoris et leurs tags associés

      💎 VERSION PREMIUM :
      - 100 recommandations par genre

      📡 Cette fonctionnalité nécessite une connexion internet.
