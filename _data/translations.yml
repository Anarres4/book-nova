      items:
        - "Bibliothèque personnelle : titres, auteurs, nombre de pages, images de couverture, descriptions et progression de lecture (une copie des titres, auteurs, ISBN et couvertures est synchronisée pour les recommandations anonymes)."
        - "Paramètres personnels : taille (optionnelle, utilisée uniquement pour la visualisation ludique de votre pile de livres, jamais synchronisée), unité d'affichage (cm/m), système métrique (métrique/impérial), avatar, langues de lecture préférées, genres favoris, préférence pour les livres audio"
        - "Défis et badges : défi sélectionné (solaire/galaxie/univers), badges débloqués et progression"
        - "Prêts de livres : livres prêtés ou empruntés, avec dates et contacts"
        - "Préférences d'interface : langue de l'application (FR/EN/ES), thème (clair/sombre), type de vue de bibliothèque"
        - "Identifiant d'appareil : UUID généré aléatoirement et stocké localement"
      note: "Les données synchronisées n'incluent aucune information personnelle d'identification (nom, adresse e-mail)."
    usage:
      title: "Stockage et traitement"
      items:
        - "Stockage local : données enregistrées dans AsyncStorage et SecureStore pour garantir l'accès hors ligne."
        - "Synchronisation sécurisée : une fois par semaine, l'application envoie à Firebase les livres, catégories, notes (étoiles) et l'identifiant anonyme nécessaires aux recommandations de lecture."
        - "Agrégation : les statistiques produites dans Firebase sont anonymisées avant d'alimenter les recommandations présentées dans l'application."
    sync:
      title: "Synchronisation Firebase"
      intro: "Les données transférées vers Firebase sont limitées aux éléments suivants :"
      items:
        - "Identifiant anonyme généré localement (UUID)"
        - "Livres de votre bibliothèque : titre, auteur, ISBN, image de couverture"
        - "Catégories utilisées et notes attribuées (étoiles)"
      purposesTitle: "Finalités du traitement :"
      purposes:
        - "Créer des recommandations des livres les plus lus, populaires et les mieux notés"
      note: "Les suggestions générées sont publiées sous forme agrégée et ne permettent pas d'identifier votre bibliothèque personnelle."
    api:
      title: "API externe : ISBNdb"
      intro: "Book Nova utilise ISBNdb pour récupérer les métadonnées publiques des livres lorsque vous :"
      items:
        - "Scannez un code-barres ISBN"
        - "Effectuez une recherche par titre ou auteur"
        - "Validez manuellement un ISBN"
      data: "Données envoyées à ISBNdb : ISBN, titre recherché, auteur recherché et langue de recherche."
      limits: "Utilisateurs gratuits : jusqu'à 4 livres enrichis par jour et maximum 150 livres ajoutés au total. Utilisateurs premium : aucune limite."
      note: "ISBNdb ne reçoit aucune information personnelle vous concernant."
    notifications:
      title: "Notifications locales"
      intro: "Les notifications sont programmées localement sur votre appareil pour :"
      items:
        - "Rappeler les livres prêtés (30 jours après le prêt)"
        - "Vous encourager à lire (rappel mensuel optionnel)"
      note: "Aucune connexion Internet n'est nécessaire."
    premium:
      title: "Version premium - RevenueCat"
      intro: "Lors d'achats in-app, RevenueCat gère vos abonnements. Nous transmettons uniquement :"
      items:
        - "UUID de votre appareil (identifiant anonyme)"
        - "Statut d'abonnement (actif/inactif)"
        - "Informations de transaction fournies par l'App Store ou Google Play"
      note: "Book Nova n'accède jamais à vos informations de paiement."
    sharing:
      title: "Partage des données"
      intro: "Nous ne vendons, n'échangeons ni ne transférons vos données, sauf :"
      items:
        - "Firebase (Google Cloud) : hébergement de la synchronisation hebdomadaire de votre bibliothèque"
        - "ISBNdb : récupération des métadonnées publiques des livres lors de vos recherches"
        - "RevenueCat : gestion de la version premium"
        - "Obligations légales : si la loi l'exige"
    security:
      title: "Sécurité et stockage"
      items:
        - "SecureStore protège votre taille et l'UUID avec le chiffrement natif iOS/Android"
        - "Firebase applique le chiffrement en transit et au repos pour les données synchronisées (Google Cloud)"
        - "Vos livres, prêts et paramètres restent consultables hors ligne sur votre appareil"
        - "Les sauvegardes iCloud ou Google Drive s'appliquent selon vos réglages système"
      warning: "Important : supprimer l'application sans sauvegarde système efface définitivement vos données."
    rights:
      title: "Vos droits"
      intro: "Vous pouvez à tout moment :"
      items:
        - "Consulter vos données directement dans l'application"
        - "Modifier vos informations par l'interface"
        - "Retirer votre consentement aux notifications dans les réglages de votre appareil"
        - "Désactiver 'Contribuer aux statistiques anonymes' dans les réglages pour suspendre la synchronisation"
        - "Demander la suppression de votre copie synchronisée en écrivant à book-nova@outlook.fr (en indiquant votre UUID)"
    permissions:
      title: "Permissions demandées"
      items:
        - "Caméra : scanner les codes-barres ISBN"
        - "Notifications : programmer des rappels locaux"
        - "Stockage local : enregistrer vos livres et paramètres"
        - "Accès réseau : synchroniser votre bibliothèque via Firebase pour les recommandations"
      note: "Ces permissions ne servent jamais à collecter des données à votre insu."
    changes:
      title: "Modifications de cette politique"
      content: "Nous pouvons mettre à jour cette politique à tout moment. Consultez-la régulièrement."
    contact:
      title: "Contact"
      content: "Pour toute question relative à vos données ou à cette politique, écrivez-nous :"
      email: "book-nova@outlook.fr"
    summary:
      title: "Résumé simplifié"
      items:
        - "Vos données restent consultables hors ligne et une copie minimale est synchronisée via Firebase pour les recommandations"
        - "Aucune donnée d'identification personnelle n'est collectée"
        - "Firebase sert uniquement à générer des recommandations de lecture anonymes"
        - "ISBNdb uniquement pour les métadonnées publiques"
        - "RevenueCat gère la version premium (données anonymisées)"
        - "Vous pouvez demander la suppression de la copie synchronisée à tout moment ou désactiver la contribution aux statistiques dans l'application"
    lastUpdated: "Dernière mise à jour : 19/03/2026"
    backToHome: "Retour à l'accueil"
  termsPage:
    title: "Conditions d'Utilisation"
    sections:
      acceptance:
