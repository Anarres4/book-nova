            - "Prepare future locally powered recommendation features"
          note: "This UUID contains no personal information and is never shared for advertising purposes. It also lets you request deletion of your synced copy."
      premium:
        title: "7. Premium Subscription and In-App Purchases"
        features:
          title: "7.1 Premium Features"
          body: "The premium version unlocks:"
          items:
