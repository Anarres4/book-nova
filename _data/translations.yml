  supportPage:
    title: "Need a hand?"
    subtitle: "We created this app for people like us—readers, not tech experts. If something's not working as expected, we're here."
    contact:
      title: "Contact us"
      emailLabel: "By email"
      inAppLabel: "From the app"
      inAppPath: "Settings → Support"
      responseTitle: "Response time"
      responseText: "1-2 business days*. No chatbot, no automated reply—just us."
      responseNote: "*Make sure your inbox isn't full, otherwise we won't be able to reply."
      deviceTitle: "Helpful tip"
      deviceText: "Please let us know your phone type and model for a faster diagnosis."
      joke: "(And if it takes longer, we're probably deep in a good book. You understand.)"
    faq:
      title: "Frequently Asked Questions"
      q1: "Does the app work offline?"
      a1: "Yes! Your books are stored on your phone. You can view and add them even without internet. Sync happens automatically when you're back online."
      q2: "Is my data safe?"
      a2: "Absolutely. Your books are synced securely via Firebase. We don't sell anything, we don't share anything with advertisers. Your library stays yours."
      q3: "How do I cancel my Premium subscription?"
      a3: "Through the settings of your App Store (iOS) or Google Play Store (Android). We don't make it complicated on purpose—that's just how in-app subscriptions work."
      q4: "I have an idea to improve the app!"
      a4: "We love that. Send us an email—the best features in Book Nova have come from user suggestions like yours."
      q5: "I found a bug."
      a5: "Thanks for letting us know! Describe what happened (and what phone you're using) and we'll take care of it quickly."
      seeDetailedFaq: "see detailed FAQ"
    finalWord:
      title: "One last thing"
      p1: "Building this app is a pleasure. But the real joy is knowing it helps people read more, discover books, and celebrate their progress."
      p2: "If you have 30 seconds, leave us a review on the App Store or Play Store. It helps us a lot to spread the word—and it warms our hearts to read your feedback."
      thanks: "Thanks for being here 📚"
      team: "— Ana + Florent = the Book Nova team"
    backToHome: "← Back to home"
  aboutPage:
    title: "A couple, one passion, one app"
    subtitle: "The story behind Book Nova"
    story:
      title: "The story"
      p1: "Book Nova was born from a simple conversation between two partners who love reading."
      p2: "We were looking for an app to track our books. Existing options were either too complex (we don't want a spreadsheet), too social (we don't want likes and followers), too timer-focused, or full of ads."
      p3: "We just wanted something simple and satisfying. A place to see what we've read, what we're reading, and that little pride of watching our library grow."
      idea: "\"What if we measured our reading in height? Like, reaching our own height in books?\""
      p4: "It was a kind of silly idea. But the more we thought about it, the more it motivated us. There was something deeply satisfying about imagining a stack of books growing up to our eyes, then above our heads."
      p5: "So we built it. Not with a team of 50 developers. Just the two of us, evenings and weekends, for months."
    whyHeight:
      title: "Why \"reach your height\"?"
      p1: "Because reading can be intimidating."
      thought1: "\"I don't have time.\""
      thought2: "\"I don't know what to read.\""
      thought3: "\"I read too slowly.\""
      p2: "We know these thoughts—we've had them too."
      p3: "The height idea is a concrete and personal goal. Not 52 books a year like internet challenges. No comparison with others."
      highlight: "Your height, your challenge."
      p4: "Whether you're 5'1\" or 6'4\", the goal is yours. And honestly? It's just fun to say \"I've read 2 feet this year.\""
    beliefs:
      title: "What we believe"
      b1_title: "Reading is traveling."
      b1_desc: "Every book is a door to another world. That's why our badges tell a space odyssey—from Earth to the far reaches of the universe."
      b2_title: "Everyone is a reader."
      b2_desc: "One book a year or a hundred, it doesn't matter. If you love reading, this app is for you."
      b3_title: "Simplicity is precious."
      b3_desc: "We refuse to add features just to have more. Every button, every screen has a reason to exist."
      b4_title: "Reading without pressure."
      b4_desc: "Zero guilt. Your TBR pile growing? No problem. Reading slowly? Perfect. Book Nova sends you no stressful notifications, no moralizing emails."
    team:
      title: "The team"
      p1: "We're a couple. Not a startup. Not a company with investors to satisfy."
      p2: "We had both just lost our jobs. Instead of letting it bring us down, we came together around a shared project: creating the reading app we always wished existed."
      p3: "Just two partners who love reading and turned a tough moment into an adventure."
      fact1: "We answer emails ourselves."
      fact2: "We read every suggestion."
      fact3: "And when you report a bug, we're the ones who fix it (often the same evening)."
      conclusion: "It might be small. But it's sincere."
    thanks:
      title: "Thank you"
      p1: "To everyone using Book Nova, sending us messages, sharing their badges on social media, suggesting improvements: thank you."
      p2: "You're part of this adventure."
      p3: "Every book you add, every badge you unlock, is a bit of your journey joining ours."
      signature: "Happy reading 📚"
      team: "— Ana + Florent = the Book Nova team"
    backToHome: "← Back to home"
