  privacyPage:
    title: "Política de Privacidad"
    intro:
      title: "Introducción"
      content: "Bienvenido a la política de privacidad de Book Nova. Valoramos tu privacidad. La aplicación guarda la mayor parte de tus datos en tu dispositivo y sincroniza una copia mínima con Firebase (Google Cloud) una vez por semana para generar recomendaciones de lectura."
    dataLocal:
      title: "Datos almacenados en tu dispositivo"
      intro: "La siguiente información permanece disponible sin conexión en tu dispositivo:"
      items:
        - "Biblioteca personal: títulos, autores, número de páginas, portadas, descripciones y progreso de lectura (se sincroniza una copia de los títulos, autores e ISBN para recomendaciones anónimas)."
        - "Ajustes personales: altura (opcional, usada solo para visualización lúdica de tu pila, nunca sincronizada), unidad de medida (cm/m), sistema (métrico/imperial), avatar, idiomas de lectura preferidos, géneros favoritos, preferencia por audiolibros"
        - "Desafíos e insignias: desafío elegido (solar/galaxia/universo), insignias desbloqueadas y progreso"
        - "Préstamos de libros: libros prestados o recibidos, con fechas y contactos"
        - "Preferencias de interfaz: idioma de la app (FR/EN/ES), tema (claro/oscuro), tipo de vista de biblioteca"
        - "Identificador del dispositivo: UUID generado aleatoriamente y almacenado localmente"
      note: "Los datos sincronizados nunca incluyen información personalmente identificable (nombre o correo electrónico)."
    usage:
      title: "Almacenamiento y tratamiento"
      items:
        - "Almacenamiento local: datos guardados en AsyncStorage y SecureStore para garantizar el acceso sin conexión."
        - "Sincronización segura: una vez por semana la app envía a Firebase los libros, categorías, valoraciones (estrellas) y el identificador anónimo necesarios para las recomendaciones de lectura."
        - "Agregación: las estadísticas generadas en Firebase se anonimizan antes de alimentar las recomendaciones que ves en la aplicación."
    sync:
      title: "Sincronización con Firebase"
      intro: "Los datos enviados a Firebase se limitan a:"
      items:
        - "Identificador anónimo generado localmente (UUID)"
        - "Libros de tu biblioteca: título, autor, ISBN e imagen de portada"
        - "Categorías utilizadas y valoraciones que asignas (estrellas)"
      purposesTitle: "Finalidades del tratamiento:"
      purposes:
        - "Crear recomendaciones de los libros más leídos, populares y mejor valorados"
      note: "Las sugerencias se publican de forma agregada y nunca exponen tu biblioteca personal."
    api:
      title: "API externa: ISBNdb"
      intro: "Book Nova usa ISBNdb solo para obtener metadatos públicos cuando tú:"
      items:
        - "Escaneas un código de barras ISBN"
        - "Buscas por título o autor"
        - "Introduces un ISBN manualmente"
      data: "Datos enviados a ISBNdb: ISBN, título buscado, autor buscado e idioma de búsqueda."
      limits: "Usuarios gratuitos: hasta 4 libros enriquecidos al día y máximo 150 libros añadidos en total. Usuarios premium: sin límite."
      note: "ISBNdb no recibe información personal sobre ti."
    notifications:
      title: "Notificaciones locales"
      intro: "Las notificaciones se programan localmente para:"
      items:
        - "Recordarte los libros prestados (30 días después)"
        - "Motivarte a leer (recordatorio mensual opcional)"
      note: "No se necesita conexión a Internet."
    premium:
      title: "Versión premium - RevenueCat"
      intro: "Para las compras in-app, RevenueCat gestiona las suscripciones. Solo compartimos:"
      items:
        - "UUID de tu dispositivo (identificador anónimo)"
        - "Estado de la suscripción (activa/inactiva)"
        - "Detalles de la transacción gestionados por App Store o Google Play"
      note: "Book Nova nunca accede a tus datos de pago."
    sharing:
      title: "Compartir datos"
      intro: "No vendemos ni compartimos tus datos, salvo:"
      items:
        - "Firebase (Google Cloud): alojar la sincronización semanal de tu biblioteca"
        - "ISBNdb: recuperar metadatos públicos durante tus búsquedas"
        - "RevenueCat: gestionar la versión premium"
        - "Obligaciones legales: cuando la ley lo requiera"
    security:
      title: "Seguridad y almacenamiento"
      items:
        - "SecureStore cifra tu altura y el UUID con la seguridad nativa de iOS/Android"
        - "Firebase cifra los datos sincronizados en tránsito y en reposo (Google Cloud)"
        - "Tus libros, préstamos y ajustes siguen disponibles sin conexión en tu dispositivo"
        - "Las copias de seguridad dependen de iCloud o Google Drive según tu sistema"
      warning: "Importante: si eliminas la app sin una copia de seguridad del sistema, perderás tus datos definitivamente."
    rights:
      title: "Tus derechos"
      intro: "En cualquier momento puedes:"
      items:
        - "Consultar tus datos directamente en la app"
        - "Modificar la información desde la interfaz"
        - "Retirar el consentimiento para notificaciones en los ajustes del dispositivo"
        - "Desactivar 'Contribuir a las estadísticas anónimas' en los ajustes para detener la sincronización"
        - "Solicitar la eliminación de la copia sincronizada escribiendo a book-nova@outlook.fr (incluye tu UUID)"
    permissions:
      title: "Permisos solicitados"
      items:
        - "Cámara: escanear códigos de barras ISBN"
        - "Notificaciones: programar recordatorios locales"
        - "Almacenamiento local: guardar libros y preferencias"
        - "Acceso a la red: sincronizar tu biblioteca a través de Firebase para recomendaciones"
      note: "Estos permisos no se usan para recopilar datos sin tu conocimiento."
    changes:
      title: "Cambios en esta política"
      content: "Podemos actualizar esta política en cualquier momento. Revísala con frecuencia."
    contact:
      title: "Contacto"
      content: "Si tienes dudas sobre tus datos o esta política, escríbenos a:"
      email: "book-nova@outlook.fr"
    summary:
      title: "Resumen rápido"
      items:
        - "Tus datos siguen disponibles sin conexión y una copia mínima se sincroniza vía Firebase solo para recomendaciones"
        - "No recopilamos datos personales identificables"
        - "Firebase se utiliza únicamente para generar recomendaciones de lectura anónimas"
        - "ISBNdb solo para metadatos públicos"
        - "RevenueCat gestiona la versión premium (datos anonimizados)"
        - "Puedes solicitar la eliminación de la copia sincronizada o desactivar la contribución en los ajustes cuando quieras"
    lastUpdated: "Última actualización: 19/03/2026"
