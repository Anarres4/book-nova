    q7: "Do I need an internet connection?"
    a7: |-
      An internet connection is only required for:
      - Scanning ISBN barcodes (automatic lookup)
      - Manually searching for a book via ISBNdb
      - Purchasing Premium

      Everything else (library, stats, badges, loans) works offline in Book Nova.
      Tip: add a book manually while offline if you know its details (title, page count, etc.).
    q8: "How do I cancel my trial period?"
    a8: |-
      📱 On Android:
      1. Open the Google Play Store app
      2. Tap your profile picture in the top right
      3. Select Payments & subscriptions > Subscriptions
      4. Find BookNova in the list
      5. Tap Cancel subscription
      6. Follow the instructions to confirm

      Note: You will keep access to premium features until the end of your trial period.

      🍎 On iOS (iPhone/iPad):
      1. Open your device's Settings app
      2. Tap your name at the top of the screen
      3. Select Subscriptions
      4. Find BookNova in the list
      5. Tap Cancel Subscription or Cancel Free Trial
      6. Confirm the cancellation

      Note: You will keep access to premium features until the end of your trial period.

      ⚠️ Important: Cancellation must be done at least 24 hours before the end of the trial period to avoid being charged.
