        responsibility:
          title: "4.2 Responsibility for Content"
          body: "You alone are responsible for the accuracy and legality of the information you enter. We are not liable for data-entry errors or disputes between users over lent books."
        backup:
          title: "4.3 Backing Up Your Data"
          body: "The App stores your information locally and syncs a copy to Firebase. Please keep your own iCloud/Google Drive backups and contact us if you want the remote copy deleted."
      isbndb:
        title: "5. ISBNdb API and Metadata"
        thirdParty:
          title: "5.1 Third-Party Service"
          body: "Book Nova relies on the ISBNdb API to fetch public book metadata. We are not responsible for:"
          items:
            - "The availability or interruptions of the ISBNdb API"
            - "The accuracy of the data provided by ISBNdb"
        limits:
          title: "5.2 Free Plan Limits"
          body: "Free users are limited to 4 books added per day, a maximum of 150 books added in total, and up to 3 simultaneous loans/borrows. Premium subscribers are not subject to these limits."
      accounts:
        title: "6. Accounts and Authentication"
        noAccount:
          title: "6.1 No Account Required"
          body: "The App does not require you to create an account. Synchronisation relies on an anonymous identifier generated on your device."
        uuid:
          title: "6.2 Anonymous Identifier (UUID)"
          body: "An anonymous identifier (UUID) is generated locally and used only to:"
          items:
            - "Manage your premium subscription status through RevenueCat"
