          note: "Vos données restent accessibles sur votre appareil. Une copie minimale (livres, catégories, notes et UUID anonyme) est synchronisée sur Firebase pour produire des recommandations anonymes."
        responsibility:
          title: "4.2 Responsabilité du Contenu"
          body: "Vous êtes seul responsable de l'exactitude et de la légalité des informations saisies dans l'Application. Nous ne sommes pas responsables des erreurs de saisie ou des litiges liés aux prêts de livres entre utilisateurs."
        backup:
          title: "4.3 Sauvegarde de Vos Données"
          body: "L'Application stocke vos données localement et synchronise une copie sur Firebase. Nous vous recommandons de conserver vos propres sauvegardes iCloud/Google Drive et de nous contacter pour supprimer la copie distante en cas de désinstallation."
      isbndb:
        title: "5. API ISBNdb et Métadonnées"
        thirdParty:
          title: "5.1 Service Tiers"
          body: "Book Nova utilise l'API ISBNdb pour récupérer les métadonnées publiques des livres. Nous ne sommes pas responsables de :"
          items:
            - "La disponibilité ou les interruptions de l'API ISBNdb"
            - "L'exactitude des données fournies par ISBNdb"
        limits:
          title: "5.2 Limitations de la Version Gratuite"
          body: "Les utilisateurs de la version gratuite sont limités à 4 livres ajoutés par jour, un maximum de 150 livres ajoutés au total, et jusqu'à 3 prêts/emprunts simultanés. Les utilisateurs premium ne sont pas soumis à ces limites."
      accounts:
