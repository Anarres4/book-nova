    q7: "¿Necesito conexión a Internet?"
    a7: |-
      Solo necesitas conexión a Internet para:
      - Escanear códigos de barras ISBN (búsqueda automática)
      - Buscar un libro manualmente mediante ISBNdb
      - Realizar compras Premium

      Para todo lo demás (biblioteca, estadísticas, insignias, préstamos), Book Nova funciona sin conexión.
      Consejo: añade un libro manualmente sin conexión si conoces sus datos (título, número de páginas, etc.).
    q8: "¿Cómo cancelo mi período de prueba?"
    a8: |-
      📱 En Android:
      1. Abre la aplicación Google Play Store
      2. Toca tu foto de perfil en la parte superior derecha
      3. Selecciona Pagos y suscripciones > Suscripciones
      4. Encuentra BookNova en la lista
      5. Toca Cancelar suscripción
      6. Sigue las instrucciones para confirmar

      Nota: Conservarás el acceso a las funciones premium hasta el final de tu período de prueba.

      🍎 En iOS (iPhone/iPad):
      1. Abre la aplicación Ajustes de tu dispositivo
      2. Toca tu nombre en la parte superior de la pantalla
      3. Selecciona Suscripciones
      4. Encuentra BookNova en la lista
      5. Toca Cancelar suscripción o Cancelar prueba gratuita
      6. Confirma la cancelación

      Nota: Conservarás el acceso a las funciones premium hasta el final de tu período de prueba.

      ⚠️ Importante: La cancelación debe realizarse al menos 24 horas antes del final del período de prueba para evitar cargos.
