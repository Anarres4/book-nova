    q7: "Ai-je besoin d'une connexion internet ?"
    a7: |-
      La connexion Internet n'est requise que pour :
      - Scanner des codes-barres ISBN (recherche automatique des informations)
      - Rechercher un livre manuellement via ISBNdb
      - Effectuer des achats Premium

      Pour tout le reste (bibliothèque, stats, badges, prêts), Book Nova fonctionne hors ligne.
      Astuce : ajoutez un livre manuellement hors ligne si vous connaissez ses informations (titre, pages, etc.).
    q8: "Comment annuler ma période d'essai ?"
    a8: |-
      📱 Sur Android :
      1. Ouvrez l'application Google Play Store
      2. Appuyez sur votre photo de profil en haut à droite
      3. Sélectionnez Paiements et abonnements > Abonnements
      4. Trouvez BookNova dans la liste
      5. Appuyez sur Annuler l'abonnement
      6. Suivez les instructions pour confirmer

      Note : Vous conservez l'accès aux fonctionnalités premium jusqu'à la fin de votre période d'essai.

      🍎 Sur iOS (iPhone/iPad) :
      1. Ouvrez l'application Réglages de votre appareil
      2. Appuyez sur votre nom en haut de l'écran
      3. Sélectionnez Abonnements
      4. Trouvez BookNova dans la liste
      5. Appuyez sur Annuler l'abonnement ou Annuler l'essai gratuit
      6. Confirmez l'annulation

      Note : Vous conservez l'accès aux fonctionnalités premium jusqu'à la fin de votre période d'essai.

      ⚠️ Important : L'annulation doit être effectuée au moins 24 heures avant la fin de la période d'essai pour éviter d'être facturé.
