    q1_premium_title: "Versión premium"
    q1_premium_limit1: "Añade libros sin límite cada día"
    q1_premium_limit2: "Libros terminados ilimitados"
    q1_premium_limit3: "Préstamos ilimitados (prestar y recibir)"
    q1_premium_limit4: "Estadísticas básicas de lectura (por mes/año)"
    q1_premium_limit5: "Estadísticas detalladas avanzadas"
    q1_premium_limit6: "Acceso a todas las insignias y medallas premium"
    q1_note: "¡Todas las funciones principales siguen siendo gratuitas!"
    q2: "¿Puedo seguir mis préstamos de libros?"
    a2: |-
      ¡Sí! Book Nova incluye un sistema completo de gestión de préstamos:
      - Registra a quién le prestas tus libros
      - Añade los libros que tomas prestados
      - Recibe notificaciones de recordatorio
      - Controla las fechas previstas de devolución

      Versión gratuita: hasta 3 operaciones de préstamo activas.
      Versión Premium: préstamos ilimitados.
    q3: "¿Qué insignias están disponibles?"
    a3: |-
      Desbloquea más de 100 insignias distintas:
      - Insignias de lectura (1, 5, 10... hasta 1.000 libros)
      - Insignias de objetivos (altura de la pila: hormiga, gato, jirafa...)
      - Insignias de géneros (ficción, biografía, ciencia ficción...)
      - Insignias especiales (lector nocturno, madrugador, maratonista de lectura...)
      - Desafíos legendarios (Solar, Galaxy, Universe)

      ¡Comparte tus insignias en redes sociales!
    q4: "¿La aplicación está disponible en varios idiomas?"
    a4: |-
      Sí, Book Nova está disponible en 3 idiomas:
      - Francés 🇫🇷
      - Inglés 🇬🇧
      - Español 🇪🇸

      También puedes indicar el idioma de cada libro para un mejor seguimiento.
    q5: "¿Cómo funciona la visualización de la pila de libros?"
    a5: |-
      Book Nova calcula la altura acumulada de todos los libros que has leído y la compara con referencias familiares:

      📏 Ejemplos:
      - 0,5 cm → la altura de una hormiga 🐜
      - 20 cm → un gato sentado 🐈
      - Tu altura → ¡tan alto como tú! 👤
      - 3 m → una jirafa 🦒

      Cada hito desbloquea una insignia única: ¡cuanto más lees, más crece tu pila!
    q6: "¿Puedo exportar mi biblioteca?"
    a6: |-
      ¡Sí, desde la versión 1.11.4!
      Puedes exportar e importar todos tus datos.
